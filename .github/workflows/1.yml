name: Extract Xiaomi ROM

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "ROM download URL (direct .tgz / .zip)"
        required: true
        type: string
      image_type:
        description: "Recovery image type for this device"
        required: true
        type: choice
        options:
          - vendor_boot
          - recovery
permissions:
  contents: write
  actions: read

jobs:
  extract-rom:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ROM_URL: ${{ github.event.inputs.rom_url }}
      IMAGE_TYPE: ${{ github.event.inputs.image_type }}
      OUT_DIR: rom_extracted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget curl aria2 p7zip-full tar cpio brotli lz4 python3 file

          # payload-dumper-go
          PDGO_VER=$(curl -s https://api.github.com/repos/ssut/payload-dumper-go/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'])")
          wget -q "https://github.com/ssut/payload-dumper-go/releases/download/${PDGO_VER}/payload-dumper-go_${PDGO_VER##v}_linux_amd64.tar.gz" \
            -O /tmp/pdgo.tar.gz
          sudo tar -xzf /tmp/pdgo.tar.gz -C /usr/local/bin payload-dumper-go
          sudo chmod +x /usr/local/bin/payload-dumper-go

      - name: Download ROM
        run: |
          mkdir -p rom_download

          ROM_FILENAME=$(basename "${ROM_URL%%\?*}")
          echo "ROM_FILENAME=$ROM_FILENAME" >> $GITHUB_ENV
          echo "Downloading: $ROM_FILENAME"

          aria2c \
            --console-log-level=warn \
            --summary-interval=30 \
            --max-connection-per-server=8 \
            --split=8 \
            --min-split-size=10M \
            --dir=rom_download \
            --out="$ROM_FILENAME" \
            "$ROM_URL"

          echo "ROM_FILE=rom_download/$ROM_FILENAME" >> $GITHUB_ENV
          echo "Size: $(du -sh "rom_download/$ROM_FILENAME" | cut -f1)"

      - name: Detect device name from ROM filename
        run: |
          FNAME="$ROM_FILENAME"

          DEVICE_FROM_FNAME=$(echo "$FNAME" | cut -d'_' -f1)
          echo "Device from filename: $DEVICE_FROM_FNAME"
          echo "DEVICE=$DEVICE_FROM_FNAME" >> $GITHUB_ENV

      - name: Extract ROM package
        run: |
          mkdir -p "$OUT_DIR"
          echo "Extracting $ROM_FILE ..."

          case "$ROM_FILE" in
            *.tgz|*.tar.gz)
              tar -xzf "$ROM_FILE" -C "$OUT_DIR" --strip-components=1
              ;;
            *.zip)
              7z x "$ROM_FILE" -o"$OUT_DIR" -y
              ;;
            *.7z)
              7z x "$ROM_FILE" -o"$OUT_DIR" -y
              ;;
            *)
              echo "Unknown extension, trying 7z..."
              7z x "$ROM_FILE" -o"$OUT_DIR" -y
              ;;
          esac

      - name: Dump payload.bin (if present)
        run: |
          PAYLOAD=$(find "$OUT_DIR" -name "payload.bin" | head -1)
          if [ -n "$PAYLOAD" ]; then
            echo "Found payload.bin, dumping..."
            mkdir -p "$OUT_DIR/payload_out"
            payload-dumper-go -o "$OUT_DIR/payload_out" "$PAYLOAD"
          else
            echo "No payload.bin, skipping."
          fi

      - name: Fallback detect device from build.prop
        run: |
          if [ -z "$DEVICE" ] || [ "$DEVICE" = "$(basename "$ROM_FILE")" ]; then
            PROP=$(find "$OUT_DIR" -name "build.prop" -o -name "default.prop" 2>/dev/null | head -1)
            if [ -n "$PROP" ]; then
              DEVICE_PROP=$(grep -m1 "ro.product.device\|ro.build.product" "$PROP" \
                | head -1 | cut -d'=' -f2 | tr -d '[:space:]')
              if [ -n "$DEVICE_PROP" ]; then
                echo "Device from prop: $DEVICE_PROP"
                echo "DEVICE=$DEVICE_PROP" >> $GITHUB_ENV
              fi
            fi
          fi
          echo "Final device name: $DEVICE"

      - name: Find boot.img and ${{ github.event.inputs.image_type }}.img
        run: |
          echo "Looking for images (device: $DEVICE, type: $IMAGE_TYPE)..."

          find_img() {
            find "$OUT_DIR" -iname "${1}.img" 2>/dev/null | head -1
          }

          BOOT_IMG=$(find_img "boot")
          TARGET_IMG=$(find_img "$IMAGE_TYPE")

          echo "───────────────────────────"
          if [ -n "$BOOT_IMG" ] && [ -f "$BOOT_IMG" ]; then
            echo "boot.img        : $BOOT_IMG ($(du -sh "$BOOT_IMG" | cut -f1))"
          else
            echo "boot.img        : not found"
          fi

          if [ -n "$TARGET_IMG" ] && [ -f "$TARGET_IMG" ]; then
            echo "${IMAGE_TYPE}.img : $TARGET_IMG ($(du -sh "$TARGET_IMG" | cut -f1))"
          else
            echo "${IMAGE_TYPE}.img : not found"
          fi
          echo "───────────────────────────"

          echo "BOOT_IMG=$BOOT_IMG"       >> $GITHUB_ENV
          echo "TARGET_IMG=$TARGET_IMG"   >> $GITHUB_ENV

      - name: Collect images
        run: |
          mkdir -p output

          copy_img() {
            local path=$1
            local label=$2
            if [ -n "$path" ] && [ -f "$path" ]; then
              cp "$path" output/
              echo "Copied $label"
            else
              echo "$label not found, skipping"
            fi
          }

          copy_img "$BOOT_IMG"   "boot.img"
          copy_img "$TARGET_IMG" "${IMAGE_TYPE}.img"

          echo ""
          echo "Final output:"
          ls -lh output/

      - name: Set release tag and version
        run: |
          TAG="${DEVICE}-$(date -u +%Y%m%d)-${{ github.run_number }}"
          ROM_VER=$(echo "$ROM_FILENAME" | cut -d'_' -f2)
          echo "TAG=$TAG"         >> $GITHUB_ENV
          echo "ROM_VER=$ROM_VER" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ env.TAG }}
          name: ${{ env.DEVICE }} images (${{ env.ROM_VER }})
          files: |
            output/boot.img
            output/${{ github.event.inputs.image_type }}.img
          generate_release_notes: false
          body: |
            **Device:** `${{ env.DEVICE }}`
            **ROM:** `${{ env.ROM_FILENAME }}`
            **Images:** `boot.img` + `${{ github.event.inputs.image_type }}.img`
            **Source:** ${{ github.event.inputs.rom_url }}
            
